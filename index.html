<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAJX Customer Review System</title>
  <meta http-equiv="refresh" content="0; url=sajx-review-form.html" />
  <style>
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7ff 0%, #ffffff 100%);
      margin: 0;
    }
    .container {
      text-align: center;
    }
    h1 {
      color: #0A84FF;
      margin-bottom: 20px;
    }
    p {
      color: #444444;
      margin-bottom: 30px;
    }
    a {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #0A84FF, #0057D9);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(10, 132, 255, 0.3);
    }
    .links {
      margin-top: 40px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .links a {
      padding: 10px 20px;
      font-size: 0.9em;
      background: white;
      color: #0A84FF;
      border: 1.5px solid #0A84FF;
    }
    .links a:hover {
      background: rgba(10, 132, 255, 0.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⭐ SAJX Review System</h1>
    <p>Redirecting to review form...</p>
    
    <a href="sajx-review-form.html">📝 Share Your Review</a>
    
    <div class="links">
      <a href="sajx-admin-dashboard.html">📊 Admin Dashboard</a>
      <a href="sajx-public-testimonials.html">💬 See Testimonials</a>
    </div>
  </div>

  <script>
    // Auto-redirect to review form in 2 seconds
    setTimeout(() => {
      window.location.href = 'sajx-review-form.html';
    }, 2000);
  </script>
</body>
</html>
